name: CICD

on: 
 workflow_dispatch: 

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        run: echo "Cloneing the code"
        
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps: 
      - name: Build using docker
        run: echo "Building using docker"
        
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Running the test
        run: echo "Testing the app"

  deploy:
    needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying on machine
        run: echo "Deplying the code"
